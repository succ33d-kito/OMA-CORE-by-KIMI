<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMA-CORE Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 40px;
            border-bottom: 2px solid #00d4ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            color: #00d4ff;
            font-size: 28px;
            letter-spacing: 2px;
        }
        .header .status {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .status-item {
            background: rgba(0, 212, 255, 0.1);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }
        .status-item .label { font-size: 12px; color: #888; }
        .status-item .value { font-size: 20px; font-weight: bold; color: #00d4ff; }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: #1a1a2e;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #00d4ff;
            color: #0a0a0f;
            border-color: #00d4ff;
        }
        
        .opportunities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }
        
        .opp-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .opp-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.1);
        }
        .opp-card.CRITICAL { border-left-color: #ff0040; }
        .opp-card.HIGH { border-left-color: #ffaa00; }
        .opp-card.MEDIUM { border-left-color: #00d4ff; }
        .opp-card.LOW { border-left-color: #00ff88; }
        
        .opp-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        .opp-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            line-height: 1.4;
        }
        .opp-priority {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .priority-CRITICAL { background: #ff0040; color: #fff; }
        .priority-HIGH { background: #ffaa00; color: #000; }
        .priority-MEDIUM { background: #00d4ff; color: #000; }
        .priority-LOW { background: #00ff88; color: #000; }
        
        .opp-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .meta-item .icon { font-size: 16px; }
        .meta-item .label { color: #888; }
        .meta-item .value { color: #e0e0e0; font-weight: 500; }
        
        .opp-score-bar {
            background: rgba(255,255,255,0.05);
            height: 6px;
            border-radius: 3px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .opp-score-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s;
        }
        .score-high { background: linear-gradient(90deg, #00ff88, #00d4ff); }
        .score-mid { background: linear-gradient(90deg, #ffaa00, #ff0040); }
        .score-low { background: #ff0040; }
        
        .opp-action {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .opp-action .action-title {
            color: #00d4ff;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .opp-action .action-text {
            font-size: 13px;
            color: #ccc;
            line-height: 1.5;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #00d4ff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #00d4ff;
            color: #0a0a0f;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            transition: all 0.3s;
        }
        .refresh-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
        }
        
        .timestamp {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 30px;
            padding-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧠 OMA-CORE v2.1</h1>
        <div class="status">
            <div class="status-item">
                <div class="label">Oportunidades</div>
                <div class="value" id="total-opps">--</div>
            </div>
            <div class="status-item">
                <div class="label">Eventos</div>
                <div class="value" id="total-events">--</div>
            </div>
            <div class="status-item">
                <div class="label">Critical</div>
                <div class="value" id="critical-count">--</div>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="filters">
            <button class="filter-btn active" onclick="filterBy('all')">Todas</button>
            <button class="filter-btn" onclick="filterBy('CRITICAL')">🔴 Critical</button>
            <button class="filter-btn" onclick="filterBy('HIGH')">🟠 High</button>
            <button class="filter-btn" onclick="filterBy('MEDIUM')">🔵 Medium</button>
            <button class="filter-btn" onclick="filterBy('LOW')">🟢 Low</button>
        </div>
        
        <div id="opportunities" class="opportunities-grid">
            <div class="loading">Cargando oportunidades...</div>
        </div>
        
        <div class="timestamp" id="timestamp"></div>
    </div>
    
    <button class="refresh-btn" onclick="loadData()">🔄 Actualizar</button>
    
    <script>
        let allOpportunities = [];
        
        function formatAssets(assets) {
            // Manejar assets como string JSON o array
            if (!assets) return 'N/A';
            if (typeof assets === 'string') {
                try {
                    const parsed = JSON.parse(assets);
                    if (Array.isArray(parsed)) return parsed.join(', ');
                    return assets;
                } catch {
                    return assets;
                }
            }
            if (Array.isArray(assets)) return assets.join(', ');
            return String(assets);
        }
        
        async function loadData() {
            try {
                const response = await fetch('/api/opportunities');
                const data = await response.json();
                
                if (data.status === 'ok') {
                    allOpportunities = data.opportunities;
                    renderOpportunities(allOpportunities);
                    updateStats(data.opportunities);
                    document.getElementById('timestamp').textContent = 
                        'Actualizado: ' + new Date(data.timestamp).toLocaleString('es-ES');
                }
            } catch (error) {
                document.getElementById('opportunities').innerHTML = 
                    '<div style="color: #ff0040; text-align: center; padding: 50px;">Error: ' + error.message + '</div>';
            }
        }
        
        function renderOpportunities(opportunities) {
            const container = document.getElementById('opportunities');
            
            if (opportunities.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 50px; color: #888;">No hay oportunidades activas</div>';
                return;
            }
            
            container.innerHTML = opportunities.map(opp => {
                const scoreClass = opp.score >= 80 ? 'score-high' : opp.score >= 50 ? 'score-mid' : 'score-low';
                const riskEmoji = opp.risk_level === 'VERY_HIGH' ? '🔴🔴' : 
                                  opp.risk_level === 'HIGH' ? '🔴' : 
                                  opp.risk_level === 'MEDIUM' ? '🟡' : '🟢';
                
                return `
                    <div class="opp-card ${opp.priority}">
                        <div class="opp-header">
                            <div class="opp-title">${escapeHtml(opp.title)}</div>
                            <span class="opp-priority priority-${opp.priority}">${opp.priority}</span>
                        </div>
                        
                        <div class="opp-score-bar">
                            <div class="opp-score-fill ${scoreClass}" style="width: ${opp.score}%"></div>
                        </div>
                        
                        <div class="opp-meta">
                            <div class="meta-item">
                                <span class="icon">📊</span>
                                <span class="label">Score:</span>
                                <span class="value">${opp.score}/100</span>
                            </div>
                            <div class="meta-item">
                                <span class="icon">🎯</span>
                                <span class="label">Convicción:</span>
                                <span class="value">${opp.conviction}/100</span>
                            </div>
                            <div class="meta-item">
                                <span class="icon">💼</span>
                                <span class="label">Assets:</span>
                                <span class="value">${formatAssets(opp.assets)}</span>
                            </div>
                            <div class="meta-item">
                                <span class="icon">⚠️</span>
                                <span class="label">Riesgo:</span>
                                <span class="value">${riskEmoji} ${opp.risk_level}</span>
                            </div>
                            <div class="meta-item">
                                <span class="icon">📡</span>
                                <span class="label">Fuente:</span>
                                <span class="value">${opp.source}</span>
                            </div>
                            <div class="meta-item">
                                <span class="icon">⏱️</span>
                                <span class="label">Timeframe:</span>
                                <span class="value">${opp.action_details?.timeframe || 'N/A'}</span>
                            </div>
                        </div>
                        
                        <div class="opp-action">
                            <div class="action-title">🎬 Acción sugerida</div>
                            <div class="action-text">${escapeHtml(opp.action_suggested)}</div>
                            <div class="action-text" style="margin-top: 5px; color: #888; font-size: 12px;">
                                💡 ${escapeHtml(opp.action_details?.rationale || '')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function filterBy(priority) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (priority === 'all') {
                renderOpportunities(allOpportunities);
            } else {
                const filtered = allOpportunities.filter(opp => opp.priority === priority);
                renderOpportunities(filtered);
            }
        }
        
        function updateStats(opportunities) {
            document.getElementById('total-opps').textContent = opportunities.length;
            const critical = opportunities.filter(o => o.priority === 'CRITICAL').length;
            document.getElementById('critical-count').textContent = critical;
            
            fetch('/api/stats')
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'ok') {
                        document.getElementById('total-events').textContent = data.stats.total_events;
                    }
                });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        setInterval(loadData, 30000);
        loadData();
    </script>
</body>
</html>
